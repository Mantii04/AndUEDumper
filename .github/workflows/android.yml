name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        # We navigate into the subfolder first
        run: chmod +x AndUEDumper/gradlew

      - name: Build with Gradle
        # We navigate into the subfolder to run the build
        run: ./AndUEDumper/gradlew assembleDebug

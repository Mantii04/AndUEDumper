name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # This is crucial to pull in dependencies

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build with CMake
        run: |
          mkdir build
          cd build
          # Add the include directory to CMAKE_CXX_FLAGS
          cmake -DCMAKE_CXX_FLAGS="-I../deps/KittyMemoryEx" ..
          make

name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build with CMake
        run: |
          mkdir build
          cd build
          # These flags disable the specific warnings that are causing the errors
          cmake -DCMAKE_CXX_FLAGS="-I../deps/KittyMemoryEx -Wno-error=class-memaccess -Wno-error=unused-command-line-argument" ..
          make
